<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Live Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="chat.css">
<style>
  body { background: transparent; }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 8px;
    gap: 5px;
  }

  /* ── CONTROL PANEL ── */
  #panel {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 10px;
  }
  #panel.visible { display: flex; }

  .panel-row { display: flex; align-items: center; gap: 7px; }

  .panel-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
    color: var(--text-dim); white-space: nowrap; width: 70px;
  }

  .btn {
    font-size: 12px; font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
    padding: 5px 13px; border-radius: 5px;
    border: none; cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn:not(:disabled):hover  { opacity: .85; }
  .btn:not(:disabled):active { transform: scale(.97); }

  .btn-auth    { background: var(--gulf-orange); color: #fff; }
  .btn-connect { background: var(--gulf-blue);   color: #fff; }
  .btn-sm      { background: rgba(255,255,255,.08); color: var(--text-dim); font-size: 11px; padding: 3px 9px; }

  /* ── SETTINGS PANEL ── */
  #settings {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 4px;
  }
  #settings.visible { display: flex; }

  .setting-row {
    display: flex; align-items: center; gap: 8px;
  }
  .setting-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .4px; color: var(--text-dim); width: 90px; flex-shrink: 0;
  }
  .setting-row input[type=range] {
    flex: 1; accent-color: var(--gulf-blue); cursor: pointer;
  }
  .setting-val {
    font-size: 11px; color: var(--text-dim); width: 32px; text-align: right; flex-shrink: 0;
  }
  .font-btns { display: flex; gap: 4px; flex: 1; }
  .font-btns .btn-sm { flex: 1; text-align: center; padding: 3px 4px; }
  .font-btns .btn-sm.active { background: var(--gulf-blue); color: #fff; }

  /* ── STATUS BAR ── */
  #status-bar {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700;
    letter-spacing: .4px; text-transform: uppercase;
    color: var(--text-dim); padding: 0 2px; min-height: 16px;
  }

  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #444; flex-shrink: 0; transition: background .4s;
  }
  #status-dot.live    { background: #22c55e; box-shadow: 0 0 5px #22c55e; animation: pulse 2s infinite; }
  #status-dot.error   { background: #ef4444; }
  #status-dot.loading { background: var(--gulf-orange); animation: pulse .8s infinite; }
  #status-dot.authed  { background: var(--gulf-blue); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  #status-text { flex: 1; }
  #msg-count   { color: var(--text-dim); font-size: 10px; }

  /* ── EMPTY STATE ── */
  #empty-state {
    text-align: center; color: var(--text-dim);
    font-size: 12px; padding: 20px 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  #empty-state .icon { font-size: 24px; opacity: .4; }

  /* ── OBS MODE (profile=obs) ── */
  body.obs-mode #panel,
  body.obs-mode #status-bar { display: none !important; }

  /* ── STREAMER MODE ── */
  body.streamer-mode { background: rgba(10,10,10,0.92); }
  body.streamer-mode #panel { display: flex; }
  body.streamer-mode #messages-wrap { gap: 1px; }

  body.streamer-mode .msg {
    background: transparent;
    border: none;
    border-left: 3px solid rgba(255,255,255,0.15);
    border-radius: 0;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    animation: none;
    padding: 2px 8px;
  }
  body.streamer-mode .msg.is-owner  { border-left-color: var(--owner); }
  body.streamer-mode .msg.is-mod    { border-left-color: var(--mod); }
  body.streamer-mode .msg.is-member { border-left-color: var(--member); }

  /* Inline layout: Author: message text on one line */
  body.streamer-mode .msg-header { display: inline; margin: 0; }
  body.streamer-mode .msg-author {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: calc(13px * var(--font-scale));
    font-weight: 600;
    max-width: none;
  }
  body.streamer-mode .badge   { display: none; }
  body.streamer-mode .msg-time { display: none; }
  body.streamer-mode .msg-text {
    display: inline;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: calc(13px * var(--font-scale));
    text-shadow: none;
    color: rgba(255,255,255,0.85);
  }
  body.streamer-mode .msg-text::before { content: ': '; color: rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div id="app">

  <!-- CONTROL PANEL -->
  <div id="panel">
    <div class="panel-row" id="row-auth">
      <span class="panel-label">Акаунт</span>
      <button class="btn btn-auth" id="btn-auth" onclick="startAuth()">🔑 Авторизуватись</button>
      <button class="btn btn-sm"   id="btn-logout" onclick="logout()" style="display:none">Вийти</button>
    </div>
    <div class="panel-row" id="row-connect" style="display:none">
      <span class="panel-label">Стрім</span>
      <button class="btn btn-connect" id="btn-connect" onclick="connectChat()">▶ Підключити</button>
      <button class="btn btn-sm"      id="btn-disconn" onclick="disconnectChat()" style="display:none">✕ Відключити</button>
      <button class="btn btn-sm" onclick="toggleSettings()" id="btn-settings" style="margin-left:auto">⚙</button>
    </div>

    <!-- SETTINGS -->
    <div id="settings">
      <div class="setting-row">
        <span class="setting-label">Прозорість</span>
        <input type="range" id="s-opacity" min="0" max="0.5" step="0.01" oninput="applySetting('opacity')">
        <span class="setting-val" id="v-opacity"></span>
      </div>
      <div class="setting-row">
        <span class="setting-label">Розмиття</span>
        <input type="range" id="s-blur" min="0" max="12" step="0.5" oninput="applySetting('blur')">
        <span class="setting-val" id="v-blur"></span>
      </div>
      <div class="setting-row">
        <span class="setting-label">Шрифт</span>
        <div class="font-btns">
          <button class="btn btn-sm" onclick="setFontSize('smallest')">XS</button>
          <button class="btn btn-sm" onclick="setFontSize('small')">S</button>
          <button class="btn btn-sm" onclick="setFontSize('normal')">M</button>
          <button class="btn btn-sm" onclick="setFontSize('big')">L</button>
          <button class="btn btn-sm" onclick="setFontSize('biggest')">XL</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Перевірка...</span>
    <span id="msg-count"></span>
  </div>

  <!-- CHAT -->
  <div id="chat-feed">
    <div id="messages-wrap">
      <div id="empty-state">
        <div class="icon">💬</div>
        <span>Авторизуйся і підключи стрім</span>
      </div>
    </div>
  </div>

</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SERVER   = 'http://localhost:3456';
const POLL_MS  = 4000;
const MAX_MSGS = 20;

const profile = new URLSearchParams(location.search).get('profile') || 'default';
if (profile === 'obs')      document.body.classList.add('obs-mode');
if (profile === 'streamer') document.body.classList.add('streamer-mode');

// ── AUTHOR COLORS ─────────────────────────────────────────────────────────────
const AUTHOR_COLORS = Array.from({length: 30}, (_, i) =>
  `hsl(${(i * 12) % 360}, 70%, 82%)`
);
const authorColorMap = {};
let colorIndex = 0;

function getAuthorColor(author) {
  if (!authorColorMap[author]) {
    authorColorMap[author] = AUTHOR_COLORS[colorIndex++ % AUTHOR_COLORS.length];
  }
  return authorColorMap[author];
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let pollInterval  = null;
let totalMsgCount = 0;
let authorized    = false;
let connected     = false;
const seenIds = new Set(); // deduplicates messages across polls

// ── ELEMENTS ──────────────────────────────────────────────────────────────────
const $dot       = document.getElementById('status-dot');
const $statusTx  = document.getElementById('status-text');
const $msgCount  = document.getElementById('msg-count');
const $wrap      = document.getElementById('messages-wrap');
const $empty     = document.getElementById('empty-state');
const $btnAuth   = document.getElementById('btn-auth');
const $btnLogout = document.getElementById('btn-logout');
const $rowConn   = document.getElementById('row-connect');
const $btnConn   = document.getElementById('btn-connect');
const $btnDisc   = document.getElementById('btn-disconn');

// ── STATUS HELPER ─────────────────────────────────────────────────────────────
function setStatus(state, text) {
  $dot.className = state ? state : '';
  $statusTx.textContent = text;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function startAuth() {
  window.open(`${SERVER}/auth/start`, '_blank', 'width=500,height=600');
  setStatus('loading', 'Чекаємо авторизації...');
  const checker = setInterval(async () => {
    const st = await getStatus();
    if (st?.authorized) { clearInterval(checker); onAuthorized(); }
  }, 2000);
}

function onAuthorized() {
  authorized = true;
  $btnAuth.style.display   = 'none';
  $btnLogout.style.display = 'inline-block';
  $rowConn.style.display   = 'flex';
  setStatus('authed', 'Авторизовано · Запусти стрім і натисни Підключити');
  $empty.querySelector('span').textContent = 'Натисни «Підключити» щоб почати';
}

async function logout() {
  await fetch(`${SERVER}/api/auth/logout`).catch(() => {});
  authorized = false; connected = false; seenIds.clear();
  stopPolling();
  $btnAuth.style.display   = 'inline-block';
  $btnLogout.style.display = 'none';
  $rowConn.style.display   = 'none';
  $btnConn.style.display   = 'inline-block';
  $btnDisc.style.display   = 'none';
  $wrap.innerHTML = '';
  $wrap.appendChild($empty);
  $empty.style.display = '';
  $empty.querySelector('span').textContent = 'Авторизуйся і підключи стрім';
  $msgCount.textContent = '';
  totalMsgCount = 0;
  setStatus('', 'Не авторизовано');
}

// ── CONNECT ───────────────────────────────────────────────────────────────────
async function connectChat() {
  setStatus('loading', 'Шукаємо активний стрім...');
  $btnConn.disabled = true;
  try {
    const res  = await fetch(`${SERVER}/api/connect`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    connected = true;
    setStatus('live', `Live · ${data.videoId || ''}`);
    $btnConn.style.display = 'none';
    $btnDisc.style.display = 'inline-block';
    $empty.style.display   = 'none';
    startPolling();
  } catch (e) {
    setStatus('error', e.message);
    $btnConn.disabled = false;
  }
}

async function disconnectChat() {
  stopPolling();
  await fetch(`${SERVER}/api/disconnect`).catch(() => {});
  connected = false; totalMsgCount = 0; seenIds.clear();
  $wrap.innerHTML = '';
  $wrap.appendChild($empty);
  $empty.style.display = '';
  $empty.querySelector('span').textContent = 'Натисни «Підключити» щоб почати';
  $btnConn.style.display = 'inline-block';
  $btnConn.disabled      = false;
  $btnDisc.style.display = 'none';
  $msgCount.textContent  = '';
  setStatus('authed', 'Відключено');
}

// ── POLLING ───────────────────────────────────────────────────────────────────
function startPolling() {
  stopPolling();
  pollMessages();
  pollInterval = setInterval(pollMessages, POLL_MS);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

async function pollMessages() {
  try {
    const res  = await fetch(`${SERVER}/api/messages`);
    const data = await res.json();

    if (!data.connected && connected) {
      connected = false;
      $btnConn.style.display = 'inline-block';
      $btnConn.disabled      = false;
      $btnDisc.style.display = 'none';
    }
    if (!data.connected && data.searching) {
      setStatus('loading', 'Шукаємо активний стрім...');
      $empty.style.display = '';
      $empty.querySelector('span').textContent = 'Очікуємо початку стріму...';
      return;
    }
    if (data.connected && !connected) {
      connected = true;
      setStatus('live', `Live · ${data.videoId || ''}`);
      $btnConn.style.display = 'none';
      $btnDisc.style.display = 'inline-block';
      $empty.style.display   = 'none';
    }
    if (data.messages?.length) appendMessages(data.messages);
  } catch {
    setStatus('error', 'Немає зʼєднання з локальним сервером');
  }
}

// ── RENDER MESSAGES ───────────────────────────────────────────────────────────
function appendMessages(msgs) {
  msgs.forEach(msg => {
    if (seenIds.has(msg.id)) return;
    seenIds.add(msg.id);
    if (msg.type !== 'textMessageEvent' && msg.type !== 'superChatEvent') return;
    if (!msg.text?.trim()) return;

    totalMsgCount++;

    const el = document.createElement('div');
    el.className = 'msg' +
      (msg.isOwner     ? ' is-owner' : '') +
      (msg.isModerator && !msg.isOwner ? ' is-mod' : '') +
      (msg.isMember    ? ' is-member' : '');

    const time = new Date(msg.timestamp)
      .toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });

    el.innerHTML = `
      <div class="msg-header">
        <span class="msg-author" style="color:${getAuthorColor(msg.author)}">${esc(msg.author)}</span>
        ${msg.isOwner ? '<span class="badge badge-owner">Стрімер</span>' : ''}
        ${msg.isModerator && !msg.isOwner ? '<span class="badge badge-mod">Мод</span>' : ''}
        ${msg.isMember ? '<span class="badge badge-member">Учасник</span>' : ''}
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${esc(msg.text)}</div>`;

    $wrap.appendChild(el);
  });

  const all = $wrap.querySelectorAll('.msg');
  if (all.length > MAX_MSGS) {
    for (let i = 0; i < all.length - MAX_MSGS; i++) all[i].remove();
  }

  requestAnimationFrame(() => { $wrap.scrollTop = $wrap.scrollHeight; });
  $msgCount.textContent = `${totalMsgCount} повід.`;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const FONT_SCALES = { smallest: 0.65, small: 0.83, normal: 1, big: 1.2, biggest: 1.44 };
const FONT_LABELS = { smallest: 'XS', small: 'S', normal: 'M', big: 'L', biggest: 'XL' };

function applySettings(s) {
  const root = document.documentElement.style;
  root.setProperty('--msg-opacity', s.opacity);
  root.setProperty('--msg-blur', s.blur + 'px');
  root.setProperty('--font-scale', FONT_SCALES[s.fontSize] ?? 1);

  document.getElementById('s-opacity').value       = s.opacity;
  document.getElementById('s-blur').value          = s.blur;
  document.getElementById('v-opacity').textContent = Math.round(s.opacity * 100) + '%';
  document.getElementById('v-blur').textContent    = s.blur + 'px';

  document.querySelectorAll('.font-btns .btn-sm').forEach(b => {
    b.classList.toggle('active', b.textContent === FONT_LABELS[s.fontSize]);
  });
}

async function saveSetting(patch) {
  try {
    const res = await fetch(`${SERVER}/api/settings?profile=${profile}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch),
    });
    applySettings(await res.json());
  } catch { /* server unreachable, ignore */ }
}

function applySetting(type) {
  if (type === 'opacity') saveSetting({ opacity: parseFloat(document.getElementById('s-opacity').value) });
  if (type === 'blur')    saveSetting({ blur:    parseFloat(document.getElementById('s-blur').value) });
}

function setFontSize(key) {
  saveSetting({ fontSize: key });
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('visible');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function getStatus() {
  try {
    const res = await fetch(`${SERVER}/api/status`);
    return await res.json();
  } catch { return null; }
}

async function init() {
  const st = await getStatus();
  if (!st) { setStatus('error', 'Сервер не запущено · npm start'); return; }

  if (st.authorized) {
    onAuthorized();
    if (st.connected) {
      connected = true;
      setStatus('live', `Live · ${st.videoId || ''}`);
      $btnConn.style.display = 'none';
      $btnDisc.style.display = 'inline-block';
      $empty.style.display   = 'none';
      startPolling(); // first poll uses lastSeq=-1, seeds history automatically
    } else if (st.searching) {
      setStatus('loading', 'Шукаємо активний стрім...');
      $empty.querySelector('span').textContent = 'Очікуємо початку стріму...';
      startPolling();
    }
  } else {
    setStatus('', 'Не авторизовано');
  }
}

document.addEventListener('keydown', e => {
  if (e.altKey && e.code === 'KeyH') {
    e.preventDefault();
    document.getElementById('panel').classList.toggle('visible');
  }
});

fetch(`${SERVER}/api/settings?profile=${profile}`)
  .then(r => r.json())
  .then(applySettings)
  .catch(() => applySettings({ opacity: 0.08, blur: 3, fontSize: 'normal' }));

init();
</script>
</body>
</html>
